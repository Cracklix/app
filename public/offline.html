<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline - Cracklix</title>
  <style>
    :root {
      --primary: #1677FF;
      --bg: #020617;
      --text: #F8FAFC;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 32px;
      border: 1px border rgba(255, 255, 255, 0.1);
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }
    h1 {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      margin: 0 0 16px 0;
    }
    p {
      color: #94A3B8;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 100px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    button:active {
      transform: scale(0.95);
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>No Connection</h1>
    <p>The preparation node is offline. Please check your internet connectivity and try again.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
