<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline - Cracklix</title>
  <link rel="stylesheet" href="/globals.css">
  <style>
    body {
      background: #020617;
      color: white;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 32px;
      border-radius: 40px;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }
    .icon-box {
      width: 80px;
      height: 80px;
      background: rgba(22, 119, 255, 0.1);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: #1677FF;
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }
    p {
      color: #94A3B8;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 32px;
    }
    button {
      background: #1677FF;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      box-shadow: 0 10px 20px -5px rgba(22, 119, 255, 0.4);
    }
    button:active {
      transform: scale(0.98);
    }
    .footer {
      margin-top: 40px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5.859 13.51a9 9 0 0 1 12.282 0"/><path d="M1 10.635a14 14 0 0 1 22 0"/></svg>
    </div>
    <h1>No Connection</h1>
    <p>Please check your network and try again. Your preparation nodes will re-sync automatically.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
  <div class="footer">Institutional Offline Registry</div>
</body>
</html>
