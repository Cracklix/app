name: Build Android APK - Production

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  analyze:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript check
        run: npm run typecheck
      
      - name: Run linting
        run: npm run lint -- --max-warnings 0

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build:android

      - name: Export to www
        run: |
          rm -rf www
          cp -r .next/static www/ || true
          cp -r public/* www/ || true

      - name: Sync Capacitor
        run: npx cap sync android --deployment

      - name: Build Android App
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APKs
        run: |
          echo "🔍 Searching for generated APKs..."
          find android/app/build/outputs/apk -type f -name "*.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cracklix-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Create Build Summary
        run: |
          echo "# Cracklix Android Build Report" > BUILD_REPORT.md
          echo "Status: SUCCESS" >> BUILD_REPORT.md
          echo "Date: $(date)" >> BUILD_REPORT.md
          echo "Commit: ${{ github.sha }}" >> BUILD_REPORT.md
