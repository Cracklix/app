name: Build & Host Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build, Sign & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Production Assets
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease -x lint -x test --no-daemon

      - name: Sign & Prepare Assets
        run: |
          mkdir -p out/apk
          
          # Move APK to distribution node
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" out/apk/cracklix-production.apk
            echo "✅ APK staged at /apk/cracklix-production.apk"
          fi

          # Move AAB to distribution node
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          if [ -f "$AAB_PATH" ]; then
            cp "$AAB_PATH" out/apk/cracklix-production.aab
            echo "✅ AAB staged for Play Store"
          fi
          
          # Version Metadata for Auto-Update Node
          echo "{\"version\": \"1.0.0\", \"build\": ${{ github.run_number }}, \"updatedAt\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > out/apk/metadata.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: cracklix0
